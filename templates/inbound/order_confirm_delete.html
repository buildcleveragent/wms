{% extends "base.html" %}
{% block title %}删除入库订单{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto card p-6">
  <h3 class="text-lg font-medium mb-3">删除确认</h3>
  <p class="text-sm text-gray-600 mb-6">确定要删除订单 <strong>{{ object.order_no }}</strong> 吗？此操作不可撤销。</p>
  <form method="post" class="flex justify-end gap-2">
    {% csrf_token %}
    <a class="btn btn-outline" href="{{ object.get_absolute_url }}">取消</a>
    <button class="btn btn-danger" type="submit">删除</button>
  </form>
</div>
{% endblock %}
