[pytest]
minversion = 8.0
DJANGO_SETTINGS_MODULE = wmsmaster.settings
python_files = tests.py test_*.py *_tests.py
testpaths = allapp
norecursedirs =
    .git
    .venv
    .idea
    node_modules
    static
    staticfiles
    media
    logs
    var
    wmsownersale/unpackage
    wmspda/unpackage
addopts =
    -ra
    --strict-config
    --strict-markers
markers =
    unit: Fast unit-level checks for isolated logic and model rules.
    integration: Cross-module workflow tests that hit multiple services or apps.
    api: API contract, permission, pagination, export, and response-shape tests.
    smoke: Release gate smoke checks for the highest-value user paths.
    e2e: End-to-end tests that exercise a full business flow across modules.
    slow: Long-running tests that are excluded from quick local feedback loops.
