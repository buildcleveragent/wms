<table class="w-full bg-white border rounded">
  <thead class="text-left text-slate-600">
    <tr>
      <th class="p-2">单号</th>
      <th class="p-2">货主</th>
      <th class="p-2">商品</th>
      <th class="p-2">仓库</th>
      <th class="p-2">数量</th>
      <th class="p-2">已核</th>
      <th class="p-2">操作</th>
    </tr>
  </thead>
  <tbody>
    {% for it in items %}
      {% include "console/_inventory_tx_row.html" with it=it %}
    {% empty %}
      <tr><td colspan="7" class="p-4 text-slate-500">无数据</td></tr>
    {% endfor %}
  </tbody>
</table>

<div class="mt-2 flex items-center gap-2">
  {% if page > 1 %}
    <a class="px-2 py-1 border rounded"
       hx-get="{% url 'console_tx_table' %}?q={{ q }}&page={{ page|add:'-1' }}"
       hx-target="#tx-table" hx-swap="outerHTML">上一页</a>
  {% endif %}
  {% if has_more %}
    <a class="px-2 py-1 border rounded"
       hx-get="{% url 'console_tx_table' %}?q={{ q }}&page={{ page|add:'1' }}"
       hx-target="#tx-table" hx-swap="outerHTML">下一页</a>
  {% endif %}
  <span class="text-sm text-slate-500 ml-auto">第 {{ page }} 页</span>
</div>
