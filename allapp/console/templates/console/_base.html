<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}控制台{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <script>
    // 让 HTMX 自动带上 CSRF
    document.addEventListener("htmx:configRequest", (e) => {
      const token = document.querySelector('meta[name="csrf-token"]').content;
      e.detail.headers['X-CSRFToken'] = token;
    });
  </script>
</head>
<body class="bg-slate-50">
  <div class="max-w-7xl mx-auto p-4">
    <header class="mb-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">{% block header %}WMS 控制台{% endblock %}</h1>
      <nav class="text-sm text-slate-600 space-x-4">
        <a href="{% url 'console_tx_list' %}" class="hover:underline">库存流水</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>

  <!-- 模态容器 -->
  <div id="modal-root"></div>
</body>
</html>
